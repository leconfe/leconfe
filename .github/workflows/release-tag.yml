name: Build & Draft Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (example: 1.2.3)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ env.RELEASE_TAG }}
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, mbstring, pdo
    
    - name: Install PHP dependencies
      run: composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --optimize-autoloader
    
    - name: Download default plugins
      run: |
        mkdir -p plugins
        count=$(yq '.plugins | length' data/plugins.yaml)

        for i in $(seq 0 $((count - 1))); do
          name=$(yq ".plugins[$i].name" data/plugins.yaml)
          link=$(yq ".plugins[$i].link" data/plugins.yaml)

          if [ -z "$link" ] || [ "$link" = "null" ]; then
            echo "Missing link for plugin index $i."
            exit 1
          fi

          asset="plugins/${name}.zip"
          echo "Downloading $name from $link..."

          if ! curl -fsSL "$link" -o "$asset"; then
            echo "Failed to download $name from $link."
            exit 1
          fi

          # extract zip ke plugins/
          unzip -q "$asset" -d "plugins"
          rm "$asset"
        done

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install JS dependencies
      run: bun install
    
    - name: Build JS assets
      run: bun run build
    
    - name: Create tar.gz archive
      run: |
        set -euo pipefail

        mkdir -p ./release
        archive_root="leconfe-${RELEASE_TAG}"
        staging_dir="./release/${archive_root}"
        rm -rf "$staging_dir"
        mkdir -p "$staging_dir"

        tar -cf - \
          --exclude='./.dockerdata' \
          --exclude='./release' \
          --exclude='./.git' \
          --exclude='./node_modules' \
          --exclude='./tests' \
          --exclude='./.github' \
          -C . . | tar -xf - -C "$staging_dir"

        tar -czf ./release/leconfe.tar.gz -C ./release "$archive_root"
        ls -l ./release/leconfe.tar.gz
        if [ ! -f ./release/leconfe.tar.gz ]; then
          echo "Error: leconfe.tar.gz was not created"
          exit 1
        fi
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Leconfe Release ${{ env.RELEASE_TAG }}
        draft: true
        prerelease: false
        generate_release_notes: true

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/leconfe.tar.gz
        asset_name: leconfe-${{ env.RELEASE_TAG }}.tar.gz
        asset_content_type: application/gzip
