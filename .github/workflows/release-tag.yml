name: Build & Draft Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (example: 1.2.3)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ env.RELEASE_TAG }}
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, mbstring, pdo
    
    - name: Install PHP dependencies
      run: composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --optimize-autoloader
    
    - name: Download default plugins
      env:
        PLUGIN_REPO_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # gh CLI uses GH_TOKEN/GITHUB_TOKEN. Prefer PLUGIN_REPO_TOKEN for cross-repo private access.
        export GH_TOKEN="${PLUGIN_REPO_TOKEN:-$GITHUB_TOKEN}"
        mkdir -p plugins
        count=$(yq '.plugins | length' data/plugins.yaml)

        for i in $(seq 0 $((count - 1))); do
          repo=$(yq ".plugins[$i].repo" data/plugins.yaml)
          version=$(yq ".plugins[$i].version" data/plugins.yaml)

          echo "Downloading from $repo @ $version..."

          asset="${repo##*/}-${version}.zip" # example: leconfe-plugin-custom-header-v1.0.0.zip

          # download release asset
          if ! gh release download "$version" \
            --repo "$repo" \
            --pattern "$asset" \
            --dir "plugins"; then
            echo "Failed to download $repo@$version."
            echo "If this repository is private, set secret PLUGIN_REPO_TOKEN with access to that repository."
            exit 1
          fi

          # extract zip ke plugins/
          unzip -q "plugins/$asset" -d "plugins"
          rm "plugins/$asset"
        done

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install JS dependencies
      run: bun install
    
    - name: Build JS assets
      run: bun run build
    
    - name: Create tar.gz archive
      run: |
        mkdir -p ./release
        tar -czf ./release/leconfe.tar.gz \
          --exclude='./.dockerdata' \
          --exclude='./release' \
          --exclude='./.git' \
          --exclude='./node_modules' \
          --exclude='./tests' \
          --exclude='./.github' \
          -C . .
        ls -l ./release/leconfe.tar.gz
        if [ ! -f ./release/leconfe.tar.gz ]; then
          echo "Error: leconfe.tar.gz was not created"
          exit 1
        fi
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Leconfe Release ${{ env.RELEASE_TAG }}
        draft: true
        prerelease: false
        generate_release_notes: true

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/leconfe.tar.gz
        asset_name: leconfe-${{ env.RELEASE_TAG }}.tar.gz
        asset_content_type: application/gzip
