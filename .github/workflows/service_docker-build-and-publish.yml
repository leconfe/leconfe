on:
  workflow_call:
    inputs:
      platforms:
        type: string
        default: 'linux/amd64,linux/arm64'
      docker-tags:
        required: true
        type: string
      dockerfile:
        type: string
        default: './dockerfile'
      target:
        type: string
        default: 'release'

jobs:
  docker-publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
    
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, mbstring, pdo
      
      - name: Install PHP dependencies
        run: composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --optimize-autoloader
      
      - name: Download default plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p plugins
          count=$(yq '.plugins | length' data/plugins.yaml)

          for i in $(seq 0 $((count - 1))); do
            repo=$(yq ".plugins[$i].repo" data/plugins.yaml)
            version=$(yq ".plugins[$i].version" data/plugins.yaml)

            echo "Downloading from $repo @ $version..."

            asset="${repo##*/}-${version}.zip" # example: leconfe-plugin-custom-header-v1.0.0.zip

            # download release asset
            gh release download "$version" \
              --repo "$repo" \
              --pattern "$asset" \
              --dir "plugins"

            # extract zip ke plugins/
            unzip -q "plugins/$asset" -d "plugins"
            rm "plugins/$asset"
          done

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install JS dependencies
        run: bun install
      
      - name: Build JS assets
        run: bun run build

      - name: Remove node_modules
        run: rm -rf node_modules

      - name: docker-build-action
        uses: serversideup/github-action-docker-build@v4
        with:
          tags: "${{ inputs.docker-tags }}"
          dockerfile: "${{ inputs.dockerfile }}"
          registry-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          registry-token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          platforms: "${{ inputs.platforms }}"
          target: "${{ inputs.target }}"