name: Docker Publish (Release)
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - '1.3.x'

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == '1.3.x'
    uses: ./.github/workflows/service_docker-build-and-publish.yml
    with:
      docker-tags: "leconfe/leconfe:${{ github.ref_name }}-dev"
      dockerfile: "./Dockerfile"
    secrets: inherit