[variables]
PHP_VERSION = '8.3'
NIXPACKS_PHP_ROOT_DIR = '/app/public'
COMPOSER_NO_DEV = '1'

[phases.install]
cmds = ['composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs', 'npm install']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'mkdir -p /var/log/nginx && (node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf; true) && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)'
