[variables]
PHP_VERSION = '8.3'
NIXPACKS_PHP_ROOT_DIR = '/app/public'
COMPOSER_NO_DEV = '1'

[phases.install]
cmds = ['composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs', 'npm install']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'chmod -R ugo+rw /app/storage /app/bootstrap/cache 2>/dev/null; node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)'
